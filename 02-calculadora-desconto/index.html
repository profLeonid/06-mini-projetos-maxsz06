<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Desconto</title>
  <script src="app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main>
    <div class="conteudo">

      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>Calculadora de <span>Desconto</span></h1>
      <p class="descricao">Informe o preço e o percentual de desconto.</p>

      <label>Preço Original (R$)</label>
      <input id="preco" type="number" placeholder="Ex: 200" />

      <label>Desconto (%)</label>
      <input id="desconto" type="number" placeholder="Ex: 15" />

      <button onclick="calcularDesconto()">Calcular</button>

      <div id="resultado" class="resultado">
        O resultado aparecerá aqui
      </div>

    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>

</body>

</html>
